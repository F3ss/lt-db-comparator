# Required source settings
app.source.bootstrapServers=localhost:9092
app.source.topic=source-topic

# Optional source overrides
app.source.groupId=meta-kafka-cp
app.source.clientId=meta-kafka-cp-consumer

# Any extra Kafka consumer property can be passed with this prefix.
# Example:
# app.source.consumer.security.protocol=SASL_SSL
# app.source.consumer.sasl.mechanism=PLAIN
# app.source.consumer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="user" password="password";

# Required target settings
app.target.bootstrapServers=localhost:9093
app.target.topic=target-topic

# Optional target overrides
app.target.clientId=meta-kafka-cp-producer

# Any extra Kafka producer property can be passed with this prefix.
# Example:
# app.target.producer.compression.type=zstd

# Copy behavior
# If true, source partition number will be reused for the target topic.
app.copy.preservePartition=false

# Poll interval and end-of-topic detection timeout in milliseconds.
app.copy.pollTimeoutMs=1000
app.copy.idleTimeoutMs=5000
